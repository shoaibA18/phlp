name: SOL Pivot Notifier

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes, all day, every day
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

permissions:
  contents: write             # needed so the workflow can commit state.json back

jobs:
  check-pivots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run pivot check
        run: python pivot_notifier.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Persist state
        run: |
          git config user.name "pivot-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update pivot state [skip ci]"
          git push
